name: Docs Architecture

on:
  pull_request:
    paths:
      - "docs/architecture/**"
  push:
    branches: [main]
    paths:
      - "docs/architecture/**"

permissions:
  contents: read

concurrency:
  group: docs-architecture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-workspace:
    name: Validate Structurizr workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workspace.dsl
        run: |
          docker run --rm -v "$PWD/docs/architecture":/usr/local/structurizr \
            structurizr/structurizr validate -workspace workspace.dsl

      # The image runs as a non-root user (uid 65532) that cannot overwrite
      # runner-owned checkout files, so export into a world-writable temp
      # mount and diff against the committed output instead.
      - name: Check generated views are fresh
        run: |
          mkdir -m 777 -p "$RUNNER_TEMP/arch-generated"
          docker run --rm \
            -v "$PWD/docs/architecture":/usr/local/structurizr \
            -v "$RUNNER_TEMP/arch-generated":/out \
            structurizr/structurizr export -workspace workspace.dsl \
            -format mermaid -output /out
          if ! diff -ru docs/architecture/generated "$RUNNER_TEMP/arch-generated"; then
            echo "::error::docs/architecture/generated/ is stale — run 'pnpm run arch' and commit the regenerated output."
            exit 1
          fi
