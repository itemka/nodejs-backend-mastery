name: CI

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed workspaces
    runs-on: ubuntu-latest
    outputs:
      workspaces: ${{ steps.detect.outputs.workspaces }}
      any: ${{ steps.detect.outputs.any }}
      root_build: ${{ steps.detect.outputs.root_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # Use the commit before the push as the diff base to include all commits in the push
            base="${{ github.event.before }}"
            # Fallbacks for edge cases (e.g., new branch where before is all zeros)
            if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
              # Try merge-base with the remote branch; if that fails, use the root commit
              base="$(git merge-base HEAD "origin/${GITHUB_REF#refs/heads/}")" || true
              if [[ -z "$base" ]]; then
                base="$(git rev-list --max-parents=0 HEAD | tail -1)"
              fi
            fi
            head="${{ github.sha }}"
          else
            echo "workspaces=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "root_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mapfile -t files < <(git diff --name-only "$base" "$head" || true)
          uniq=()
          seen_paths=$'\n'
          root_build=false
          for f in "${files[@]}"; do
            case "$f" in
              .github/workflows/ci.yml | package.json | pnpm-lock.yaml | pnpm-workspace.yaml | tsconfig.base.json)
                root_build=true
                ;;
            esac

            if [[ "$f" =~ ^workspaces/(apps|ai-engineering|packages)/([^/]+)/ ]]; then
              workspace_path="workspaces/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
              if [[ "$seen_paths" != *$'\n'"$workspace_path"$'\n'* ]]; then
                workspace_name="$(jq -r '.name // empty' "$workspace_path/package.json" 2>/dev/null || true)"
                if [[ -z "$workspace_name" ]]; then
                  continue
                fi
                uniq+=("$workspace_name"$'\t'"$workspace_path")
                seen_paths+="$workspace_path"$'\n'
              fi
            fi
          done
          if [[ "${#uniq[@]}" -eq 0 ]]; then
            echo "workspaces=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            workspaces_json=$(printf '%s\n' "${uniq[@]}" | jq -R -s -c 'split("\n")[:-1] | map(split("\t") | {name: .[0], path: .[1]})')
            echo "workspaces=$workspaces_json" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi
          echo "root_build=$root_build" >> "$GITHUB_OUTPUT"

  quality:
    name: Lint / Format / Types / Unit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm run lint
      - name: Prettier (check)
        run: pnpm run format:check
      - name: Type check
        run: pnpm run typecheck
      - name: Unit tests
        run: pnpm run test

  workspace:
    name: Check ${{ matrix.workspace.path }}
    needs: [detect, quality]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.x]
        workspace: ${{ fromJSON(needs.detect.outputs.workspaces) }}
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint ${{ matrix.workspace.path }}
        run: pnpm --filter "${{ matrix.workspace.name }}" run --if-present lint
      - name: Typecheck ${{ matrix.workspace.path }}
        run: pnpm --filter "${{ matrix.workspace.name }}" run --if-present typecheck
      - name: Test ${{ matrix.workspace.path }}
        run: pnpm --filter "${{ matrix.workspace.name }}" run --if-present test
      - name: Build ${{ matrix.workspace.path }}
        run: pnpm --filter "${{ matrix.workspace.name }}" run --if-present build

  root-build:
    name: Build all workspaces
    needs: [detect, quality]
    if: needs.detect.outputs.root_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build all workspaces
        run: pnpm run build

  security:
    name: Audit / Gitleaks
    needs: quality
    if: always() && ( github.event_name == 'pull_request' || github.ref == 'refs/heads/main' )
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22.x]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Audit (fail on high)
        run: pnpm dlx audit-ci@^6 --high --package-manager pnpm
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarcloud:
    name: SonarCloud
    needs: quality
    if: always() && ( github.event_name == 'pull_request' || github.ref == 'refs/heads/main' )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for proper blame/PR decoration
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Skip SonarCloud on forked PRs (no secrets)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "Fork PR detected: skipping SonarCloud scan (no secrets exposed)."
      - name: SonarCloud Scan
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SONAR_TOKEN != '') || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && env.SONAR_TOKEN != '')
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed for PR decoration, if any
        with:
          args: >
            -Dsonar.qualitygate.wait=true
